<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Digital TV - Bintang Pelajar</title>
    <style>
        /* --- TEMA WARNA & VARIABEL --- */
        :root {
            --primary: #1e3a8a;       
            --primary-light: #2a4365; 
            --secondary: #48d1cc;     
            --bg-gradient-1: #f0fdfa; 
            --bg-gradient-2: #e2e8f0; 
            --text-dark: #1e293b;
            --text-light: #64748b;
            --danger: #ef4444;        
        }

        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px 25px; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER CARD MODERN --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            padding: 15px 30px;
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px;
            border-left: 8px solid var(--secondary); 
        }

        .logo-container { width: 140px; }
        .logo-container img { width: 100%; height: auto; }

        .title-wrapper { text-align: right; }
        .header h1 {
            font-size: 28px;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }
        #clock {
            font-size: 20px;
            color: var(--danger);
            font-weight: 700;
            margin-top: 5px;
            letter-spacing: 1px;
        }
        #page-indicator {
            color: var(--text-light);
            font-size: 16px;
            font-weight: bold;
            margin-top: 4px;
        }

        /* --- TABLE CARD MODERN --- */
        .table-container {
            flex-grow: 1;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            color: #ffffff;
            font-size: 20px;
            padding: 16px 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 4px solid var(--secondary); 
        }

        td {
            padding: 12px 10px;
            font-size: 22px;
            text-align: center;
            vertical-align: middle;
            color: var(--text-dark);
            border-bottom: 1px solid #f1f5f9;
        }

        tbody tr:nth-child(even) {
            background-color: #f8fafc;
        }

        /* --- TIPOGRAFI ISI TABEL --- */
        .col-siswa {
            text-align: left;
            font-size: 17px;
            line-height: 1.3;
            font-weight: 500;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .col-sesi { font-size: 30px; font-weight: 900; color: var(--danger); }
        .col-guru { font-weight: 800; color: var(--primary); }
        .col-mapel { font-weight: bold; color: var(--text-light); }

        /* --- ANIMASI FADE IN --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        tbody tr { animation: fadeUp 0.6s ease-out forwards; }
        tbody tr:nth-child(1) { animation-delay: 0.1s; }
        tbody tr:nth-child(2) { animation-delay: 0.2s; }
        tbody tr:nth-child(3) { animation-delay: 0.3s; }
        tbody tr:nth-child(4) { animation-delay: 0.4s; }
        tbody tr:nth-child(5) { animation-delay: 0.5s; }
        tbody tr:nth-child(6) { animation-delay: 0.6s; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <img src="https://www.bintangpelajar.com/wp-content/uploads/2023/05/LOGO_BP_rev-2023.webp" alt="Logo BP">
        </div>
        <div class="title-wrapper">
            <h1>Jadwal Kegiatan Pembelajaran</h1>
            <div id="clock">Memuat Waktu...</div>
            <div id="page-indicator">Halaman - dari -</div>
        </div>
    </div>

    <div class="table-container">
        <table id="schedule-table">
            <thead>
                <tr>
                    <th width="12%">SESI</th>
                    <th width="22%">GURU</th>
                    <th width="8%">RUANG</th>
                    <th width="18%">MAPEL/KELAS</th>
                    <th width="40%">NAMA SISWA</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="5" style="padding: 50px; font-style: italic; color: #64748b;">
                        Menghubungkan ke Database Bintang Pelajar...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // =========================================================================
        // PENTING: MASUKKAN URL API (GOOGLE APPS SCRIPT) ANDA DI BAWAH INI
        // =========================================================================
        var API_URL = "https://script.google.com/macros/s/AKfycbywopky_VUnmvfktok0xRaXDpQrzjuOMo7VjfAselVjzZI7G6FBwijJJh8G9LZWUCqqdw/exec"; 
        
        var SLIDE_DURATION = 5000;  // 5 detik per slide
        var REFRESH_DATA = 60000;   // Update data dari Google tiap 1 menit

        var scheduleData = [];
        var pages = []; // Menyimpan data per halaman yang sudah dihitung
        var currentPageIndex = 0;
        var slideInterval = null;

        function fetchData() {
            var xhr = new XMLHttpRequest();
            
            // PERBAIKAN 1: ANTI-CACHE (Memaksa TV menarik data paling baru)
            var urlAntiMacet = API_URL + (API_URL.indexOf('?') > -1 ? '&' : '?') + 'waktu=' + new Date().getTime();
            
            xhr.open("GET", urlAntiMacet, true); // Menggunakan URL anti macet
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        scheduleData = JSON.parse(xhr.responseText);
                        if(scheduleData.length > 0) {
                            calculateDynamicPages(); 
                        } else {
                            pages = [];
                            document.getElementById('table-body').innerHTML = '<tr><td colspan="5" style="padding: 50px;">Tidak ada jadwal pada sesi ini.</td></tr>';
                            document.getElementById('page-indicator').innerText = 'Halaman 0 dari 0';
                        }
                    } catch(e) {
                        console.error("Gagal memproses data");
                    }
                }
            };
            xhr.send();
        }

        // MESIN CERDAS PEMOTONG HALAMAN (SMART PAGINATION)
        function calculateDynamicPages() {
            var tbody = document.getElementById('table-body');
            var container = document.querySelector('.table-container');
            var table = document.getElementById('schedule-table');
            
            pages = [];
            tbody.innerHTML = ''; 
            
            var currentPageData = [];
            var safeMargin = 15; // Jarak aman sebelum menyentuh batas bawah kotak
            
            for (var i = 0; i < scheduleData.length; i++) {
                var row = scheduleData[i];
                var tr = document.createElement('tr');
                
                var namaSiswa = row.siswa ? String(row.siswa).replace(/\n/g, '<br>') : '-';
                if(namaSiswa.trim() === "") namaSiswa = "-";
                
                tr.innerHTML = 
                    '<td class="col-sesi">' + (row.sesi || '-') + '</td>' +
                    '<td class="col-guru">' + (row.guru || '-') + '</td>' +
                    '<td>' + (row.ruang || '-') + '</td>' +
                    '<td class="col-mapel">' + (row.mapel || '-') + '</td>' +
                    '<td class="col-siswa">' + namaSiswa + '</td>';
                
                tbody.appendChild(tr);
                currentPageData.push(row);
                
                // Cek apakah tabel melewati tinggi batas kotak putih
                if (table.offsetHeight > (container.clientHeight - safeMargin)) {
                    // Jika baru 1 baris tapi langsung kepanjangan, terpaksa simpan
                    if (currentPageData.length === 1) {
                        pages.push(currentPageData);
                        currentPageData = [];
                        tbody.innerHTML = '';
                    } else {
                        // Tarik baris terakhir karena membuat kepanjangan
                        tbody.removeChild(tr);
                        currentPageData.pop();
                        
                        // Simpan halaman yang ukurannya sudah pas
                        pages.push(currentPageData);
                        
                        // Mulai halaman baru dengan baris yang ditarik tadi
                        currentPageData = [row];
                        tbody.innerHTML = '';
                        tbody.appendChild(tr);
                    }
                }
            }
            
            // Masukkan sisa baris ke halaman terakhir
            if (currentPageData.length > 0) {
                pages.push(currentPageData);
            }
            
            tbody.innerHTML = ''; // Bersihkan layar simulasi
            
            // Tampilkan halaman pertama dan mulai rotasi
            currentPageIndex = 0;
            renderPage();
            startPagination();
        }

        // MENAMPILKAN HALAMAN YANG SUDAH DIHITUNG
        function renderPage() {
            if (pages.length === 0) return;
            
            var tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; 
            
            document.getElementById('page-indicator').innerText = 'Halaman ' + (currentPageIndex + 1) + ' dari ' + pages.length;

            var pageData = pages[currentPageIndex];
            pageData.forEach(function(row) {
                var tr = document.createElement('tr');
                var namaSiswa = row.siswa ? String(row.siswa).replace(/\n/g, '<br>') : '-';
                if(namaSiswa.trim() === "") namaSiswa = "-";
                
                tr.innerHTML = 
                    '<td class="col-sesi">' + (row.sesi || '-') + '</td>' +
                    '<td class="col-guru">' + (row.guru || '-') + '</td>' +
                    '<td>' + (row.ruang || '-') + '</td>' +
                    '<td class="col-mapel">' + (row.mapel || '-') + '</td>' +
                    '<td class="col-siswa">' + namaSiswa + '</td>';
                
                tbody.appendChild(tr);
            });
        }

        // PEMUTAR HALAMAN OTOMATIS
        function startPagination() {
            if(slideInterval !== null) clearInterval(slideInterval);
            
            if (pages.length > 1) {
                slideInterval = setInterval(function() {
                    currentPageIndex++;
                    if (currentPageIndex >= pages.length) currentPageIndex = 0;
                    renderPage();
                }, SLIDE_DURATION);
            }
        }

        // JAM DIGITAL
        function updateClock() {
            var now = new Date();
            var days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            var months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
            
            var day = days[now.getDay()];
            var date = now.getDate();
            var month = months[now.getMonth()];
            var year = now.getFullYear();

            var h = ("0" + now.getHours()).slice(-2);
            var m = ("0" + now.getMinutes()).slice(-2);
            var s = ("0" + now.getSeconds()).slice(-2);

            document.getElementById('clock').innerText = day + ', ' + date + ' ' + month + ' ' + year + ' | ' + h + ':' + m + ':' + s + ' WIB';
        }

        setInterval(updateClock, 1000); 
        updateClock();
        
        fetchData(); 
        setInterval(fetchData, REFRESH_DATA); 
        // Refresh seluruh halaman TV otomatis setiap 3 jam agar animasi tetap mulus
        setTimeout(function() { location.reload(); }, 10800000);
    </script>
</body>
</html>
