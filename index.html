<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Digital TV - Bintang Pelajar</title>
    <style>
        /* --- TEMA WARNA & VARIABEL --- */
        :root {
            --primary: #1e3a8a;       /* Biru Navy BP */
            --primary-light: #2a4365; /* Navy Terang untuk gradasi */
            --secondary: #48d1cc;     /* Hijau Tosca BP */
            --bg-gradient-1: #f0fdfa; /* Background atas */
            --bg-gradient-2: #e2e8f0; /* Background bawah */
            --text-dark: #1e293b;
            --text-light: #64748b;
            --danger: #ef4444;        /* Merah untuk jam & Sesi */
        }

        /* --- PENGATURAN DASAR LAYAR TV --- */
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px 25px; /* Memberi bingkai ruang di TV */
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER CARD MODERN --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            padding: 15px 30px;
            border-radius: 15px; /* Sudut membulat */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Bayangan lembut */
            margin-bottom: 20px;
            border-left: 8px solid var(--secondary); /* Aksen garis tosca di kiri */
        }

        .logo-container { width: 140px; }
        .logo-container img { width: 100%; height: auto; }

        .title-wrapper { text-align: right; }
        .header h1 {
            font-size: 28px;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }
        #clock {
            font-size: 20px;
            color: var(--danger);
            font-weight: 700;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* --- TABLE CARD MODERN --- */
        .table-container {
            flex-grow: 1;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); /* Bayangan agar tabel melayang */
            overflow: hidden; /* Memotong sudut tabel agar ikut membulat */
            display: flex;
            flex-direction: column;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            color: #ffffff;
            font-size: 20px;
            padding: 16px 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 4px solid var(--secondary); /* Aksen batas header tabel */
        }

        td {
            padding: 12px 10px;
            font-size: 22px;
            text-align: center;
            vertical-align: middle;
            color: var(--text-dark);
            border-bottom: 1px solid #f1f5f9;
        }

        /* Zebra Striping (Warna baris selang-seling agar mudah dibaca) */
        tbody tr:nth-child(even) {
            background-color: #f8fafc;
        }

        /* --- TIPOGRAFI ISI TABEL --- */
        .col-siswa {
            text-align: left;
            font-size: 17px;
            line-height: 1.3;
            font-weight: 500;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .col-sesi {
            font-size: 30px;
            font-weight: 900;
            color: var(--danger);
        }
        .col-guru {
            font-weight: 800;
            color: var(--primary);
        }
        .col-mapel {
            font-weight: bold;
            color: var(--text-light);
        }

        /* --- ANIMASI MUNCUL HALUS (FADE IN) --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        tbody tr {
            animation: fadeUp 0.6s ease-out forwards;
        }

        /* Membuat animasi bergiliran untuk tiap baris */
        tbody tr:nth-child(1) { animation-delay: 0.1s; }
        tbody tr:nth-child(2) { animation-delay: 0.2s; }
        tbody tr:nth-child(3) { animation-delay: 0.3s; }
        tbody tr:nth-child(4) { animation-delay: 0.4s; }
        tbody tr:nth-child(5) { animation-delay: 0.5s; }

    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <img src="https://www.bintangpelajar.com/wp-content/uploads/2023/05/LOGO_BP_rev-2023.webp" alt="Logo BP">
        </div>
        <div class="title-wrapper">
            <h1>Jadwal Kegiatan Pembelajaran</h1>
            <div id="clock">Memuat Waktu...</div>
        </div>
    </div>

    <div class="table-container">
        <table id="schedule-table">
            <thead>
                <tr>
                    <th width="12%">SESI</th>
                    <th width="22%">GURU</th>
                    <th width="8%">RUANG</th>
                    <th width="18%">MAPEL/KELAS</th>
                    <th width="40%">NAMA SISWA</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="5" style="padding: 50px; font-style: italic; color: #64748b;">
                        Menghubungkan ke Database Bintang Pelajar...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // =========================================================================
        // PENTING: MASUKKAN URL API (GOOGLE APPS SCRIPT) ANDA DI BAWAH INI
        // =========================================================================
        var API_URL = "URL_APPS_SCRIPT_ANDA_DISINI"; 
        
        function fetchData() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", API_URL, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        var tbody = document.getElementById('table-body');
                        
                        // Menghapus isi tabel lama agar animasi CSS bisa berjalan ulang
                        tbody.innerHTML = ''; 

                        if (data.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="5" style="padding: 50px;">Tidak ada jadwal pada sesi ini.</td></tr>';
                            return;
                        }

                        data.forEach(function(row) {
                            var tr = document.createElement('tr');
                            var namaSiswa = row.siswa ? String(row.siswa).replace(/\n/g, '<br>') : '-';
                            if(namaSiswa.trim() === "") namaSiswa = "-";
                            
                            tr.innerHTML = 
                                '<td class="col-sesi">' + (row.sesi || '-') + '</td>' +
                                '<td class="col-guru">' + (row.guru || '-') + '</td>' +
                                '<td>' + (row.ruang || '-') + '</td>' +
                                '<td class="col-mapel">' + (row.mapel || '-') + '</td>' +
                                '<td class="col-siswa">' + namaSiswa + '</td>';
                            
                            tbody.appendChild(tr);
                        });
                    } catch(e) {
                        console.error("Gagal memproses data");
                    }
                }
            };
            xhr.send();
        }

        function updateClock() {
            var now = new Date();
            var days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            var months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
            
            var day = days[now.getDay()];
            var date = now.getDate();
            var month = months[now.getMonth()];
            var year = now.getFullYear();

            var h = ("0" + now.getHours()).slice(-2);
            var m = ("0" + now.getMinutes()).slice(-2);
            var s = ("0" + now.getSeconds()).slice(-2);

            document.getElementById('clock').innerText = day + ', ' + date + ' ' + month + ' ' + year + ' | ' + h + ':' + m + ':' + s + ' WIB';
        }

        setInterval(updateClock, 1000); 
        updateClock();
        
        fetchData(); 
        setInterval(fetchData, 300000); // Tarik data setiap 5 menit
    </script>
</body>
</html>
